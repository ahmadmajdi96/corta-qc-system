services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corta-qc-web
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "8120:8120"
    environment:
      HOST: 0.0.0.0
      PORT: "8120"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-oms.cortanexai.com,localhost}
    volumes:
      # Mount source for hot reload; keep node_modules inside the container
      - .:/app
      - /app/node_modules
