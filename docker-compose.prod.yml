services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        # Point this at your hosted backend (Lovable / remote API).
        VITE_API_BASE: ${VITE_API_BASE}
    container_name: corta-qc-web-prod
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8120}:8120"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8120"
